# Copy .env from .env.example, set secrets, and use MYSQL_HOST=f95bot-mysql / REDIS_URL=redis://redis:6379 in Compose.
# Use the mysql container name (f95bot-mysql), not the service name "mysql", if web shares networks with
# other stacks: otherwise "mysql" can resolve to a different host on the Traefik network.
#
# If MySQL was first started without MYSQL_DATABASE, or you reused an old volume, you may get
# "Unknown database" (ER_BAD_DB_ERROR). With the stack running: sh scripts/ensure-mysql-db.sh
# then: sh scripts/docker-migrate.sh
#
# Full MySQL volume wipe + import f95bot.sql (set passwords in .env first): after backing up, run
#   CONFIRM_RESET=yes sh scripts/reset-mysql-volume-and-restore.sh
# f95bot.sql is app data only; MySQL users use MYSQL_ROOT_PASSWORD / MYSQL_USER / MYSQL_PASS.
# After an old-dump import, the script runs knex migrate:latest (see app_state + custom commands).
# Seeds are not re-run after a dump (avoid duplicate rows). For a brand-new empty DB only, once:
#   sh scripts/docker-seed-first-init.sh
# Manual fix if bot errors on "custom commands": docker compose run --build --rm --no-deps bot sh -c "npx knex migrate:latest"
services:
  mysql:
    image: mysql:8.0
    container_name: f95bot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-f95bot}
      MYSQL_USER: ${MYSQL_USER:-f95bot}
      MYSQL_PASSWORD: ${MYSQL_PASS:-f95bot}
    ports:
      - "127.0.0.1:3987:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: f95bot-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  bot:
    image: f95bot-app:latest
    pull_policy: never
    build: .
    container_name: f95bot-bot
    env_file: .env
    command: npm run start:bot
    environment:
      MYSQL_HOST: f95bot-mysql
      REDIS_URL: redis://f95bot-redis:6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    volumes:
      - ./logs:/usr/src/app/logs
      - ./src/bot/media/cards:/usr/src/app/src/bot/media/cards
      # Host chat/exports: create ./chatdump on host, then: docker compose up -d --force-recreate bot
      - ./chatdump:/usr/src/app/chatdump

  web:
    image: f95bot-app:latest
    pull_policy: never
    build: .
    container_name: f95bot-web
    env_file: .env
    command: npm run start:web
    # App listens on PORT from .env; map the same port on host and container.
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    environment:
      MYSQL_HOST: f95bot-mysql
      REDIS_URL: redis://f95bot-redis:6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    volumes:
      - ./src/bot/media/cards:/usr/src/app/src/bot/media/cards
    networks:
      - default
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.f95bot-web.rule=Host(`bot.zonies.xyz`)"
      - "traefik.http.routers.f95bot-web.entrypoints=websecure"
      - "traefik.http.routers.f95bot-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.f95bot-web.middlewares=public@file"
      - "traefik.http.services.f95bot-web.loadbalancer.server.port=${PORT:-3000}"
      - "traefik.http.routers.f95bot-web.service=f95bot-web"
    profiles:
      - web

volumes:
  mysql_data:
  redis_data:

networks:
  traefik-network:
    external: true
